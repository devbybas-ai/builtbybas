# BuiltByBas — Nginx reverse proxy
# Copy to: /etc/nginx/sites-available/builtbybas
# Symlink: ln -s /etc/nginx/sites-available/builtbybas /etc/nginx/sites-enabled/
# After SSL: certbot --nginx -d builtbybas.com -d www.builtbybas.com

# Redirect www to non-www
server {
    listen 80;
    server_name www.builtbybas.com;
    return 301 https://builtbybas.com$request_uri;
}

server {
    listen 80;
    server_name builtbybas.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect to HTTPS (uncomment after SSL is set up)
    # return 301 https://$host$request_uri;

    # --- Reverse proxy (HTTP — use until SSL is configured) ---
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

