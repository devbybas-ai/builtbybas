# BuiltByBas — Nginx reverse proxy
# Copy to: /etc/nginx/sites-available/builtbybas
# Symlink: ln -s /etc/nginx/sites-available/builtbybas /etc/nginx/sites-enabled/
# SSL managed by: certbot --nginx -d builtbybas.com -d www.builtbybas.com

# Redirect www to non-www (HTTP)
server {
    listen 80;
    server_name www.builtbybas.com;
    return 301 https://builtbybas.com$request_uri;
}

# Redirect www to non-www (HTTPS)
server {
    listen 443 ssl http2;
    server_name www.builtbybas.com;

    ssl_certificate /etc/letsencrypt/live/builtbybas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/builtbybas.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://builtbybas.com$request_uri;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name builtbybas.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name builtbybas.com;

    ssl_certificate /etc/letsencrypt/live/builtbybas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/builtbybas.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json
        image/svg+xml
        text/plain
        text/xml
        application/xml;

    # --- Security headers (defense in depth) ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- Reverse proxy ---
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
